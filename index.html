<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balança Digital ESP32</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin-top: 50px; }
        .box { background: #1e1e1e; padding: 40px; margin: 20px auto; border-radius: 20px; border: 2px solid #007bff; width: 80%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #peso { font-size: 4rem; font-weight: bold; color: #00ff00; text-shadow: 0 0 10px rgba(0,255,0,0.3); }
        .unit { font-size: 1.5rem; color: #aaa; margin-bottom: 20px; }
        button { padding: 15px 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border: none; border-radius: 10px; margin: 10px; transition: 0.3s; }
        .btn-connect { background: #007bff; color: white; }
        .btn-connect:hover { background: #0056b3; }
        .btn-tare { background: #dc3545; color: white; width: 100%; }
        .btn-tare:hover { background: #a71d2a; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h1>Balança Bluetooth</h1>
    <button class="btn-connect" onclick="conectar()">CONECTAR BALANÇA</button>

    <div class="box">
        <div id="peso">0.00</div>
        <div class="unit">gramas</div>
        <hr style="border: 0.5px solid #444; margin: 20px 0;">
        <button class="btn-tare" onclick="enviarTara()">ZERAR (TARA)</button>
    </div>

    <script>
        // Use os mesmos UUIDs do código do ESP32
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const TX_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        const RX_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

        let characteristicRX;

        async function conectar() {
            try {
                console.log("Iniciando busca...");
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                console.log("Conectando ao GATT...");
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);

                const txChar = await service.getCharacteristic(TX_UUID);
                await txChar.startNotifications();
                
                txChar.addEventListener('characteristicvaluechanged', e => {
                    const decoder = new TextDecoder();
                    const valor = decoder.decode(e.target.value);
                    document.getElementById('peso').innerText = valor;
                });

                characteristicRX = await service.getCharacteristic(RX_UUID);
                alert("Conectado com sucesso!");

            } catch (err) {
                console.error("Erro Bluetooth:", err);
                alert("Erro ao conectar: " + err.message);
            }
        }

        async function enviarTara() {
            if (!characteristicRX) return alert("Conecte a balança primeiro!");
            try {
                await characteristicRX.writeValue(new TextEncoder().encode("T"));
                console.log("Comando de Tara enviado!");
            } catch (err) {
                alert("Erro ao enviar comando: " + err);
            }
        }
    </script>
</body>
</html>
