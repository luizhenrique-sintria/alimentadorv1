<div class="card">
        <h3>Programar Horários</h3>
        <div style="margin-bottom: 15px;">
            Manhã: 
            <select id="h1">
                <option value="06:00">06:00</option>
                <option value="07:00">07:00</option>
                <option value="08:00" selected>08:00</option>
                <option value="09:00">09:00</option>
                <option value="10:00">10:00</option>
            </select>
        </div>
        <div style="margin-bottom: 20px;">
            Tarde/Noite: 
            <select id="h2">
                <option value="17:00">17:00</option>
                <option value="18:00" selected>18:00</option>
                <option value="19:00">19:00</option>
                <option value="20:00">20:00</option>
                <option value="21:00">21:00</option>
            </select>
        </div>
        <button onclick="salvarProgramacao()" style="background: #2196F3; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">
            💾 SALVAR PROGRAMAÇÃO
        </button>
    </div>

    <script>
        // ... (função initWebSocket e enviar permanecem iguais)

        function salvarProgramacao() {
            const hora1 = document.getElementById('h1').value;
            const hora2 = document.getElementById('h2').value;
            
            // Envia os dois horários de uma vez só
            const comando = "SAVE_SCHEDULE:" + hora1 + "|" + hora2;
            enviar(comando);
            
            alert("Horários enviados para o ESP32: " + hora1 + " e " + hora2);
        }
    </script>
